name: Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension (production)
        run: node esbuild.mjs --production

      - name: Type check
        run: npx tsc --noEmit

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          # push to main => pre-release; workflow_dispatch => full release.
          $isPreRelease = '${{ github.event_name }}' -eq 'push'
          $preReleaseStr = $isPreRelease.ToString().ToLower()
          echo "pre_release=$preReleaseStr" >> $env:GITHUB_OUTPUT

          # Read version from package.json
          $pkg = Get-Content -Raw package.json | ConvertFrom-Json
          $version = $pkg.version
          $tag = "v$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

          # VS Code Marketplace requires bare major.minor.patch (no -suffix) for pre-releases.
          # See https://code.visualstudio.com/api/working-with-extensions/publishing-extension#prerelease-extensions
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
              throw "package.json version '$version' must be major.minor.patch with no suffix."
          }

          # Skip re-releasing an already-published version (e.g. non-version-bump merges to main).
          $tagExists = (git tag -l $tag) -ne ''
          if ($tagExists) {
              Write-Host "Tag $tag already exists — skipping release."
              echo "skip=true" >> $env:GITHUB_OUTPUT
              return
          }
          echo "skip=false" >> $env:GITHUB_OUTPUT

          # Extract the latest non-Unreleased changelog entry for the GitHub Release.
          $changelog = Get-Content CHANGELOG.md -Raw
          $entries = [regex]::Matches($changelog, '(?ms)^## \[([^\]]+)\][^\n]*\r?\n(.*?)(?=^## |\z)')
          $entry = $null
          foreach ($m in $entries) {
              if ($m.Groups[1].Value -ne 'Unreleased') {
                  $entry = $m
                  break
              }
          }
          if (-not $entry) {
              throw "No ## [x.y.z] section found in CHANGELOG.md (Unreleased is skipped)."
          }
          $title = $entry.Groups[1].Value
          $body = $entry.Groups[2].Value.Trim()
          if ($title -ne $version) {
              throw "Top changelog entry is [$title] but package.json is $version — they must match before releasing."
          }
          echo "title=$title" >> $env:GITHUB_OUTPUT
          $body | Out-File -FilePath release_body.md -Encoding utf8

      - name: Package VSIX
        if: steps.release_meta.outputs.skip != 'true'
        run: |
          mkdir -p out
          if [ "${{ steps.release_meta.outputs.pre_release }}" = "true" ]; then
            npx @vscode/vsce package --pre-release --out ./out/
          else
            npx @vscode/vsce package --out ./out/
          fi

      - name: Record VSIX path
        id: vsix
        if: steps.release_meta.outputs.skip != 'true'
        shell: pwsh
        run: |
          Get-ChildItem -Path ./out/*.vsix | ForEach-Object {
              echo "asset_path=$($_.FullName)" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        if: steps.release_meta.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Release ${{ steps.release_meta.outputs.version }}
          body_path: release_body.md
          prerelease: ${{ steps.release_meta.outputs.pre_release }}
          files: ${{ steps.vsix.outputs.asset_path }}

      - name: Publish to VS Code Marketplace
        if: steps.release_meta.outputs.skip != 'true'
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          extensionFile: ${{ steps.vsix.outputs.asset_path }}
          registryUrl: https://marketplace.visualstudio.com
          preRelease: ${{ steps.release_meta.outputs.pre_release }}
